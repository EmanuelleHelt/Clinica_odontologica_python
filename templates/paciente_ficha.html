<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha do Paciente - Clínica</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container dashboard-container">
        <div class="row">
            <div class="col-md-8 col-md-offset-2">
                <div class="main-panel">
                    <div class="text-right mb-3" style="margin-bottom: 20px;">
                        <a href="{{ url_for('login') }}" class="btn btn-ouro">Sair</a>
                    </div>
                    
                    <h2 class="text-ouro text-center" style="margin-top: 0;">Prontuário Médico</h2>
                    <hr style="border-color: #e2fdf6;">
                    
                    <div class="card-paciente">
                        <h3 style="color: #e2fdf6; margin-top: 0;">{{ paciente.nome }}</h3>
                        <p style="color: #49a4fc; font-size: 16px;">
                            <strong>Idade:</strong> {{ paciente.idade }} anos<br>
                            <strong>Status Atual:</strong> {{ paciente.status }}
                        </p>
                    </div>

                    <h4 class="text-ouro" style="margin-top: 30px;">Próximo Agendamento</h4>
                    <div style="background-color: #153a83; border: 1px solid #49a4fc; padding: 15px; border-radius: 4px;">
                        <p style="color: #e2fdf6; margin: 0; font-size: 18px;">
                            <strong>Procedimento:</strong> {{ paciente.proximo_procedimento }}
                        </p>
                    </div>

                    <h4 class="text-ouro" style="margin-top: 30px;">Histórico de atendimento</h4>
                    <ul style="color: #49a4fc; font-size: 16px; line-height: 1.8;">
                        {% for item in paciente.historico %}
                            <li>{{ item }}</li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
