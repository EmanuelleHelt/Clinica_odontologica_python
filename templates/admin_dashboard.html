<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Administração</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container dashboard-container">
        <div class="row">
            <div class="col-md-8 col-md-offset-2">
                <div class="main-panel text-center">
                    <h2 class="text-ouro" style="margin-top: 0;">Centro de Comando</h2>
                    <p class="text-muted">Escolha qual domínio da clínica você deseja checar hoje.</p>
                    <hr style="border-color: #e2fdf6; margin-bottom: 30px;">
                    
                    <div class="row">
                        <div class="col-sm-6" style="margin-bottom: 20px;">
                            <div class="card-paciente" style="border-left: none; border-bottom: 5px solid #e2fdf6;">
                                <h3 style="color: #e2fdf6;">Secretaria</h3>
                                <p style="color: #49a4fc;">Gerenciamento de agenda, controle de pacientes e dentistas.</p>
                                <a href="{{ url_for('secretaria_recepcao') }}" class="btn btn-ouro btn-block">Acessar Secretaria</a>
                            </div>
                        </div>
                        <div class="col-sm-6" style="margin-bottom: 20px;">
                            <div class="card-paciente" style="border-left: none; border-bottom: 5px solid #e2fdf6;">
                                <h3 style="color: #e2fdf6;">Limpeza</h3>
                                <p style="color: #49a4fc;">Gerenciamento de organização e limpeza dos consultórios.</p>
                                <a href="{{ url_for('interface_limpeza') }}" class="btn btn-ouro btn-block">Acessar Limpeza</a>
                            </div>
                        </div>
                    </div>
                    <hr style="border-color: #49a4fc; margin-top: 20px;">
                    <a href="{{ url_for('login') }}" class="btn btn-danger" style="background-color: #be834e; border: none; font-weight: bold; color: #08134b;">Abandonar o sistema (Sair)</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
