<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Paciente - Secretaria</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container dashboard-container">
        <div class="row">
            <div class="col-md-6 col-md-offset-3">
                <div class="main-panel">
                    <div class="text-right mb-3" style="margin-bottom: 20px;">
                        <a href="{{ url_for('secretaria_recepcao') }}" class="btn btn-ouro">Desistir da Edição</a>
                    </div>
                    
                    <h2 class="text-ouro text-center" style="margin-top: 0;">Alterar dados</h2>
                    <p class="text-center text-muted">Alterando os registros oficiais do paciente #{{ paciente.nome }}</p>
                    <hr style="border-color: #e2fdf6;">
                    
                    <form action="{{ url_for('editar_paciente', id_paciente=paciente.id) }}" method="POST">
                        <div class="form-group">
                            <label for="nome" style="color: #e2fdf6;">Nome Completo</label>
                            <input type="text" class="form-control" id="nome" name="nome" value="{{ paciente.nome }}" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="telefone" style="color: #e2fdf6;">Telefone</label>
                            <input type="text" class="form-control" id="telefone" name="telefone" value="{{ paciente.telefone }}" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="status" style="color: #e2fdf6;">Status Atual</label>
                            <select class="form-control" id="status" name="status">
                                <option value="Aguardando" {% if paciente.status == 'Aguardando' %}selected{% endif %}>Aguardando na Recepção</option>
                                <option value="Agendada" {% if paciente.status == 'Agendada' %}selected{% endif %}>Consulta Agendada</option>
                                <option value="Em pânico" {% if paciente.status == 'Em pânico' %}selected{% endif %}>Em pânico na sala de espera</option>
                            </select>
                        </div>

                        <hr style="border-color: #49a4fc; margin-top: 30px;">
                        <h4 class="text-ouro">Modificar Chaves de Acesso</h4>

                        <div class="form-group">
                            <label for="usuario_login" style="color: #e2fdf6;">Nome de Usuário (Login)</label>
                            <input type="text" class="form-control" id="usuario_login" name="usuario_login" value="{{ paciente.usuario_login }}" required>
                        </div>

                        <div class="form-group">
                            <label for="senha_login" style="color: #e2fdf6;">Senha do Paciente</label>
                            <input type="text" class="form-control" id="senha_login" name="senha_login" value="{{ senha_atual }}" required>
                        </div>
                        
                        <button type="submit" class="btn btn-ouro btn-block" style="margin-top: 20px; font-size: 16px;">Salvar dados alterados</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
